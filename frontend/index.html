<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQI Sentinel</title>
    <style>
      /* Visible before React mounts — avoids “mystery black screen” */
      html, body, #root {
        height: 100%;
        margin: 0;
      }
      body {
        background: #000;
        color: #fff;
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      }
      #boot-fallback {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 24px;
        text-align: center;
      }
      #boot-fallback .spin {
        width: 28px;
        height: 28px;
        border: 2px solid rgba(10, 132, 255, 0.3);
        border-top-color: #0A84FF;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      #boot-fallback p {
        margin: 0;
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #8E8E93;
      }
      #boot-fallback .hint {
        max-width: 360px;
        font-size: 11px;
        letter-spacing: normal;
        text-transform: none;
        line-height: 1.5;
        color: #8E8E93;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot-fallback" aria-live="polite">
        <div class="spin" aria-hidden="true"></div>
        <p>Starting AQI Sentinel…</p>
        <p class="hint">
          If this never changes, serve the build with
          <code style="color:#0A84FF">npm run preview</code>
          from the <code style="color:#0A84FF">frontend</code> folder
          (do not open <code>dist/index.html</code> as a file).
        </p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
